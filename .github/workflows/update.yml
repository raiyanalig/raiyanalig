name: Update SVG

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: "18"

      - name: Install dependencies
        run: npm install

      - name: Generate SVG
        run: node generate.js

      - name: Commit and Force Push SVG
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add profile-gitblock.svg
          git commit -m "Update SVG" || echo "No changes"
          git push origin main --force
